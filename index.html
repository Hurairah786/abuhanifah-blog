<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Abu Hanifah Blog — Translations, reflections, and Islamic resources." />
  <title>Abu Hanifah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">abuhanifah<span>.blog</span></a>
      <nav class="nav">
        <a href="index.html" class="active">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="home-hero">
      <div class="container">
        <div class="home-hero-inner">
          <div class="home-hero-left">
            <span class="kicker">@1_abuhurairah</span>
            <h1>Abu Hanifah<br>Blog</h1>
            <p class="home-tagline">Translations, articles and resources on Islam — written with care and grounded in scholarship.</p>
            <div style="margin-top: 1.5rem; display: flex; gap: 0.6rem; flex-wrap: wrap;">
              <a href="blog.html" class="btn btn-primary">Browse Articles</a>
              <a href="about.html" class="btn btn-ghost">About</a>
            </div>
          </div>
          <div class="home-hero-right" id="latest-post-block">
            <!-- injected by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Recent posts -->
    <section>
      <div class="container">
        <div class="content-layout">
          <div class="posts-column">
            <div class="posts-filter-bar">
              <span class="filter-label">Recent</span>
              <span class="posts-count" id="home-count"></span>
            </div>
            <div class="post-list" id="home-post-list"></div>
          </div>
          <aside class="sidebar" id="home-sidebar"></aside>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> abuhanifah.blog</p>
      <a href="blog.html">All Articles</a>
    </div>
  </footer>

  <script src="posts.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Latest post
    const latest = POSTS[POSTS.length - 1];
    document.getElementById('latest-post-block').innerHTML = `
      <span class="latest-label">Latest Post</span>
      <div class="latest-title"><a href="${latest.file}" style="color:inherit;">${latest.title}</a></div>
      <div class="latest-excerpt">${latest.excerpt}</div>
      <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.85rem;">
        ${latest.tags.map(t => `<span class="tag" style="cursor:default; pointer-events:none;">${t}</span>`).join('')}
      </div>
      <a href="${latest.file}" class="text-link">Read article →</a>
    `;

    // Post list (all, max 6 on home)
    const listEl = document.getElementById('home-post-list');
    const shown = [...POSTS].reverse().slice(0, 6);
    document.getElementById('home-count').textContent = `${POSTS.length} article${POSTS.length !== 1 ? 's' : ''}`;
    listEl.innerHTML = shown.map(p => `
      <div class="post-item">
        <div class="post-item-left">
          <div class="post-item-tags">${p.tags.map(t => `<span class="tag" style="cursor:default;">${t}</span>`).join('')}</div>
          <div class="post-item-title"><a href="${p.file}">${p.title}</a></div>
          <div class="post-item-excerpt">${p.excerpt}</div>
          <div class="post-item-meta"><span>${p.date}</span><span>${p.readTime} read</span></div>
        </div>
        <div><a href="${p.file}" class="read-arrow" title="Read">→</a></div>
      </div>
    `).join('');

    // Sidebar
    document.getElementById('home-sidebar').innerHTML = `
      <div class="sidebar-section sidebar-about">
        <span class="sidebar-heading">About this blog</span>
        <p>Translations, reflections and Islamic resources. Written with care, grounded in scholarship.</p>
        <a href="about.html">Read more →</a>
      </div>
      <div class="sidebar-section">
        <span class="sidebar-heading">Topics</span>
        <div class="sidebar-tag-list">
          ${TAGS.map(t => `<a href="blog.html?tag=${t}" class="tag">${t}</a>`).join('')}
        </div>
      </div>
    `;
  </script>
</body>
</html>
